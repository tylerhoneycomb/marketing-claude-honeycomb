name: Deploy webapp to GitHub Pages

# Publishes the Honeycomb Ads dashboard (webapp/index.html)
# to GitHub Pages whenever the webapp folder changes on main.
# The dashboard will be available at:
#   https://tylerhoneycomb.github.io/marketing-claude-honeycomb/
#
# First-time setup (done once, on the GitHub website):
#   Settings → Pages → Source → "GitHub Actions"
# After that, every push to main that touches webapp/ triggers
# an automatic rebuild and republish.

on:
  push:
    branches: [main]
    paths:
      - 'webapp/**'
      - '.github/workflows/deploy-webapp.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; new pushes cancel older runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload webapp folder as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './webapp'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
