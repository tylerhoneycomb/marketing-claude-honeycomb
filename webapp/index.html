<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Honeycomb Ads Dashboard</title>

  <!--
    Honeycomb Ads Intelligence Dashboard
    ————————————————————————————————————
    Single-file React SPA. Loads React, Recharts, Tailwind, and
    Babel from CDN so the file can be opened directly in a
    browser, served from any static host (Vercel, Netlify,
    GitHub Pages), or embedded in Apps Script HtmlService.

    Data source:
    - Reads from the Apps Script Web App deployed from
      /webapp/apps-script-api.gs
    - If no API URL is configured, uses in-memory mock data
      so the dashboard is usable out-of-the-box for preview.

    Setup:
    1. Open this file in a browser (or deploy the folder).
    2. Click "Connect API" and paste the Apps Script /exec URL.
    3. The URL is saved to localStorage; subsequent visits
       reconnect automatically.
  -->

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-is@18.3.1/umd/react-is.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Oxygen, Ubuntu, Cantarell, sans-serif;

    .narrative-text {

<body class="bg-stone-50 text-stone-900">
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useMemo, useCallback } = React;
    const {
      LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
      ResponsiveContainer, BarChart, Bar
    } = Recharts;

    const STORAGE_KEY = 'honeycomb_api_url';


    // ─── FORMATTING HELPERS ───────────────────────────────

    const fmtCurrency = n => {
      if (n == null || isNaN(n)) return '—';
      return '$' + Number(n).toLocaleString(undefined, { maximumFractionDigits: 0 });
    };

    const fmtCurrencyCents = n => {
      if (n == null || isNaN(n)) return '—';
      return '$' + Number(n).toLocaleString(undefined, {
        minimumFractionDigits: 2, maximumFractionDigits: 2
      });
    };

    const fmtNumber = (n, digits = 0) => {
      if (n == null || isNaN(n)) return '—';
      return Number(n).toLocaleString(undefined, { maximumFractionDigits: digits });
    };

    const fmtPct = (n, digits = 2) => {
      if (n == null || isNaN(n)) return '—';
      return Number(n).toFixed(digits) + '%';
    };

    const daysAgo = n => {
      const d = new Date();
      d.setDate(d.getDate() - n);
      return d.toISOString().substring(0, 10);
    };

    const today = () => new Date().toISOString().substring(0, 10);

    // ── Period helpers ──
    // Today's data is considered incomplete (the day hasn't
    // ended and the daily pipeline runs at 7am for "yesterday's
    // data"), so every date-range helper below excludes today.
    const yesterdayStr = () => {
      const d = new Date();
      d.setDate(d.getDate() - 1);
      return d.toISOString().substring(0, 10);
    };

    // Returns the start date such that [start, yesterday] is
    // exactly n days long.
    //   priorNDays(7)  → 7 days ending yesterday
    //   priorNDays(30) → 30 days ending yesterday
    const priorNDays = (n) => {
      const d = new Date();
      d.setDate(d.getDate() - n);
      return d.toISOString().substring(0, 10);
    };

    const startOfMonthStr = () => {
      const d = new Date();
      return new Date(d.getFullYear(), d.getMonth(), 1).toISOString().substring(0, 10);
    };

    const startOfQuarterStr = () => {
      const d = new Date();
      const q = Math.floor(d.getMonth() / 3);
      return new Date(d.getFullYear(), q * 3, 1).toISOString().substring(0, 10);
    };

    const startOfYearStr = () => {
      const d = new Date();
      return new Date(d.getFullYear(), 0, 1).toISOString().substring(0, 10);
    };

    // Monday-of-ISO-week for a given date string (yyyy-MM-dd).
    // Used to aggregate daily rows into weekly buckets.
    const isoWeekStart = (dateStr) => {
      const [y, m, d] = dateStr.substring(0, 10).split('-').map(Number);
      const dt = new Date(y, m - 1, d);
      const day = dt.getDay() || 7; // Mon=1..Sun=7
      dt.setDate(dt.getDate() - (day - 1));
      return dt.toISOString().substring(0, 10);
    };

    // First-of-month key for a given date string (yyyy-MM).
    // Used to aggregate rollup rows into monthly buckets.
    const monthKey = (dateStr) => dateStr.substring(0, 7);


    // ─── MATH HELPERS ─────────────────────────────────────

    // Simple linear regression for trendline overlays.
    // Takes an array of { x, y } points (x is a number index,
    // y is the value). Returns { slope, intercept } or null
    // if there aren't at least 2 points with valid y values.
    function linearRegression(points) {
      const valid = points.filter(p => p.y != null && !isNaN(p.y));
      const n = valid.length;
      if (n < 2) return null;
      let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
      valid.forEach(p => {
        sumX += p.x;
        sumY += p.y;
        sumXY += p.x * p.y;
        sumXX += p.x * p.x;
      });
      const denom = n * sumXX - sumX * sumX;
      if (denom === 0) return null;
      const slope = (n * sumXY - sumX * sumY) / denom;
      const intercept = (sumY - slope * sumX) / n;
      return { slope, intercept };
    }

    // Distinct, accessible palette for up to 18 campaigns.
    // Falls back to cycling through the list if more than 18.
    const CAMPAIGN_COLORS = [
      '#f59e0b', '#0891b2', '#10b981', '#8b5cf6', '#ef4444',
      '#ec4899', '#14b8a6', '#84cc16', '#6366f1', '#f97316',
      '#a855f7', '#06b6d4', '#22c55e', '#eab308', '#3b82f6',
      '#d946ef', '#f43f5e', '#78716c',
    ];
    const colorForCampaign = (idx) => CAMPAIGN_COLORS[idx % CAMPAIGN_COLORS.length];


    // ─── DATA LAYER ───────────────────────────────────────
    // When apiUrl is set, fetches from the Apps Script /exec
    // endpoint. When empty, returns generated mock data so
    // the dashboard renders immediately on first open.

    function generateMockData() {
      const campaigns = [
        { name: 'Restaurant ICPs — Q2 2026',  baseline: 210, conv: 2.4 },
        { name: 'Brewery Leads — National',   baseline: 145, conv: 1.6 },
        { name: 'Gym/Fitness — Metro Test',   baseline: 165, conv: 1.1 },
        { name: 'Salon & Spa — Local',        baseline:  95, conv: 1.3 },
        { name: 'Bakery/Cafe — Midwest',      baseline: 120, conv: 1.8 },
      ];

      const daily = [];
      const end = new Date();
      for (let i = 90; i >= 0; i--) {
        const d = new Date(end);
        d.setDate(d.getDate() - i);
        const dateStr = d.toISOString().substring(0, 10);
        campaigns.forEach((c, idx) => {
          // Seeded wobble so the mock looks realistic but stable-ish within a day
          const seed = (i * 7 + idx * 13) % 100 / 100;
          const wobble = 0.82 + (seed * 0.36);
          const spend = Math.round(c.baseline * wobble);
          const conv = Math.max(0, Math.round(c.conv * wobble * (0.7 + (seed * 0.6))));
          const impr = Math.round(spend * 42 * (0.9 + seed * 0.2));
          const clicks = Math.round(impr * 0.013 * (0.85 + seed * 0.3));
          const reach = Math.round(impr / 2.3);
          daily.push({
            date: dateStr,
            month: d.toLocaleString('en-US', { month: 'long' }),
            week: Math.ceil(d.getDate() / 7),
            campaign_name: c.name,
            campaign_id: c.name.replace(/[^a-z0-9]+/gi, '_').toLowerCase(),
            impressions: impr,
            clicks: clicks,
            spend: spend,
            reach: reach,
            conversions: conv,
            frequency: Math.round((impr / reach) * 100) / 100,
            cpl: conv > 0 ? Math.round((spend / conv) * 100) / 100 : null
          });
        });
      }

      const mappings = campaigns.map(c => ({
        campaign_name: c.name,
        utm_campaign: c.name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '')
      }));

      // ── Weekly rollup mock — gives the CPICP trend chart
      // something meaningful to draw. Each campaign gets its
      // own trajectory (some improving, some degrading).
      const rollup = [];
      const rollupEnd = new Date();
      rollupEnd.setDate(rollupEnd.getDate() - (rollupEnd.getDay() + 6) % 7); // back to Monday
      for (let w = 12; w >= 0; w--) {
        const ws = new Date(rollupEnd);
        ws.setDate(ws.getDate() - w * 7);
        const wsStr = ws.toISOString().substring(0, 10);
        const progress = (12 - w) / 12; // 0 → 1 as we move forward in time
        campaigns.forEach((c, idx) => {
          const wobble = 0.85 + ((w * 11 + idx * 7) % 100 / 100) * 0.3;
          const weekSpend = Math.round(c.baseline * 7 * wobble);
          // Half the campaigns trend better over time, half worse.
          const trendDir = idx % 2 === 0 ? -1 : 1;
          const baseCpicp = 78 + idx * 11;
          const cpicp = Math.max(
            30,
            baseCpicp + (trendDir * progress * 28) + (((w * 5 + idx * 3) % 20) - 10)
          );
          const estIcps = Math.max(0.5, Math.round((weekSpend / cpicp) * 10) / 10);
          const attribIcps = Math.round(estIcps * (0.5 + (idx % 3) * 0.1));
          const metaConv = Math.round(estIcps * 1.4);
          const priorCpicp = w < 12
            ? (rollup[rollup.length - campaigns.length]
                && rollup[rollup.length - campaigns.length + idx]
                && rollup[rollup.length - campaigns.length + idx].cpicp_blended) || null
            : null;
          rollup.push({
            week_start:           wsStr,
            campaign_name:        c.name,
            utm_campaign:         c.name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, ''),
            spend:                weekSpend,
            impressions:          Math.round(weekSpend * 42),
            clicks:               Math.round(weekSpend * 42 * 0.013),
            reach:                Math.round(weekSpend * 18),
            avg_frequency:        Math.round((2.1 + (idx % 4) * 0.3) * 100) / 100,
            ctr:                  0.012,
            meta_conversions:     metaConv,
            icps_attributed:      attribIcps,
            estimated_icps:       estIcps,
            attribution_rate:     Math.round((attribIcps / estIcps) * 1000) / 10,
            cpl:                  metaConv > 0 ? Math.round((weekSpend / metaConv) * 100) / 100 : null,
            cpicp_attributed:     attribIcps > 0 ? Math.round((weekSpend / attribIcps) * 100) / 100 : null,
            cpicp_blended:        Math.round(cpicp * 100) / 100,
          });
        });
      }

      const weekStart = new Date();
      weekStart.setDate(weekStart.getDate() - weekStart.getDay() - 6);
      const narrative = {
        generated_at: new Date().toISOString(),
        reporting_week: weekStart.toISOString().substring(0, 10),
        total_spend: 4725,
        total_icps: 48,
        overall_cpicp: '98.44',
        narrative:
          'OVERALL\n' +
          'Solid week. $4,725 spend produced 48 estimated ICPs at $98 CPICP, a 4% improvement WoW. Attribution quality held above 60%.\n\n' +
          'SEGMENTS\n' +
          '- restaurant_icps_q2_2026: $82 CPICP, 18 ICPs\n' +
          '- bakery_cafe_midwest: $91 CPICP, 11 ICPs\n' +
          '- brewery_leads_national: $108 CPICP, 9 ICPs\n' +
          '- salon_spa_local: $115 CPICP, 6 ICPs\n' +
          '- gym_fitness_metro_test: $142 CPICP, 4 ICPs\n' +
          '- Zero ICPs: none\n\n' +
          'WATCH\n' +
          '- Gym/Fitness frequency trending to 3.2, approaching saturation threshold\n' +
          '- Brewery CPICP up 9% WoW — review creative rotation\n\n' +
          'ACTION\n' +
          '- Hold current budgets through Wednesday check-in\n' +
          '- Refresh Brewery creative assets before Friday optimizer run\n' +
          '- Flag Gym/Fitness for review if frequency crosses 3.5'
      };

      return { daily, rollup, mappings, narrative };
    }

    const MOCK = generateMockData();

    async function fetchAction(apiUrl, action, params = {}) {
      if (!apiUrl) {
        // Offline / mock mode
        if (action === 'daily') {
          const s = params.start || '1900-01-01';
          const e = params.end   || '2999-12-31';
          return MOCK.daily.filter(r => r.date >= s && r.date <= e);
        }
        if (action === 'rollup')    return MOCK.rollup;
        if (action === 'mappings')  return MOCK.mappings;
        if (action === 'narrative') return MOCK.narrative;
        return [];
      }

      const qs = new URLSearchParams({ action, ...params }).toString();
      const resp = await fetch(`${apiUrl}?${qs}`);
      if (!resp.ok) {
        throw new Error(`API error: ${action} → HTTP ${resp.status}`);
      }
      const json = await resp.json();
      if (json && json.error) {
        throw new Error(`API error: ${json.error}`);
      }
      return json;
    }


    // ─── SHARED CAMPAIGN AGGREGATION ─────────────────────
    // Rolls a weekly rollup dataset up to per-campaign totals
    // inside a date range. Used by the leaderboard component
    // AND conceptually by the weekly performance table (which
    // has its own inline version). Keep the two in sync if
    // you change what's being summed.
    function aggregateCampaigns(rollup, rangeStart, rangeEnd) {
      const inRange = rollup.filter(r => {
        const ws = String(r.week_start).substring(0, 10);
        return ws >= rangeStart && ws <= rangeEnd;
      });

      const byCampaign = {};
      inRange.forEach(r => {
        const key = r.campaign_name;
        if (!byCampaign[key]) {
          byCampaign[key] = {
            campaign_name: key,
            utm_campaign: r.utm_campaign,
            spend: 0,
            impressions: 0,
            clicks: 0,
            meta_conversions: 0,
            estimated_icps: 0,
            icps_attributed: 0,
            weekCount: 0,
          };
        }
        const c = byCampaign[key];
        c.spend            += Number(r.spend) || 0;
        c.impressions      += Number(r.impressions) || 0;
        c.clicks           += Number(r.clicks) || 0;
        c.meta_conversions += Number(r.meta_conversions) || 0;
        c.estimated_icps   += Number(r.estimated_icps) || 0;
        c.icps_attributed  += Number(r.icps_attributed) || 0;
        c.weekCount++;
      });

      return Object.values(byCampaign).map(c => ({
        ...c,
        cpicp_blended:    c.estimated_icps > 0 ? c.spend / c.estimated_icps : null,
        cpl:              c.meta_conversions > 0 ? c.spend / c.meta_conversions : null,
        ctr:              c.impressions > 0 ? c.clicks / c.impressions : null,
        attribution_rate: c.estimated_icps > 0 ? (c.icps_attributed / c.estimated_icps) * 100 : null,
      }));
    }

    // ─── CHART METRIC CATALOG ────────────────────────────
    // Metrics the MetricTrendChart can display. Each metric
    // defines:
    //  - key / label / shortLabel: identity + display
    //  - color: default stroke color
    //  - lowerIsBetter / neutral: direction semantics for
    //    coloring trend summaries (not directly used in chart)
    //  - availableAt: which granularities this metric supports
    //  - source: which dataset to read at each granularity
    //     ('daily' = rolling_data, 'rollup' = weekly_rollup)
    //  - formatValue: long format for tooltips
    //  - formatAxis: short format for Y axis ticks
    //  - aggregateRows: how to combine an array of rows into
    //    a single value for a time bucket (week/month) or a
    //    campaign total. Handles the "ratio metric" problem
    //    correctly (e.g. CPICP is not a simple average).
    //  - tooltip: plain-English explanation shown via InfoTip
    const METRIC_CATALOG = [
      {
        key: 'cpicp_blended',
        label: 'Blended CPICP',
        shortLabel: 'CPICP',
        color: '#0891b2',
        lowerIsBetter: true,
        availableAt: { day: false, week: true, month: true },
        source: { week: 'rollup', month: 'rollup' },
        formatValue: (v) => fmtCurrencyCents(v),
        formatAxis:  (v) => '$' + v,
        aggregateRows: (rows) => {
          const s = rows.reduce((a, r) => a + (Number(r.spend) || 0), 0);
          const i = rows.reduce((a, r) => a + (Number(r.estimated_icps) || 0), 0);
          return i > 0 ? Math.round((s / i) * 100) / 100 : null;
        },
        tooltip: 'Blended Cost Per ICP. Total spend divided by estimated ICPs (hybrid attribution). Lower is better.',
      },
      {
        key: 'estimated_icps',
        label: 'Estimated ICPs',
        shortLabel: 'Est. ICPs',
        color: '#10b981',
        lowerIsBetter: false,
        availableAt: { day: false, week: true, month: true },
        source: { week: 'rollup', month: 'rollup' },
        formatValue: (v) => fmtNumber(v, 1),
        formatAxis:  (v) => v,
        aggregateRows: (rows) =>
          Math.round(rows.reduce((s, r) => s + (Number(r.estimated_icps) || 0), 0) * 10) / 10,
        tooltip: 'Estimated ICPs using hybrid attribution (UTM-matched plus proportional share of unattributed).',
      },
      {
        key: 'attribution_rate',
        label: 'Attribution Rate',
        shortLabel: 'Attr %',
        color: '#8b5cf6',
        lowerIsBetter: false,
        availableAt: { day: false, week: true, month: true },
        source: { week: 'rollup', month: 'rollup' },
        formatValue: (v) => (v == null ? '—' : v.toFixed(1) + '%'),
        formatAxis:  (v) => v + '%',
        aggregateRows: (rows) => {
          const e = rows.reduce((s, r) => s + (Number(r.estimated_icps) || 0), 0);
          const a = rows.reduce((s, r) => s + (Number(r.icps_attributed) || 0), 0);
          return e > 0 ? Math.round((a / e) * 1000) / 10 : null;
        },
        tooltip: 'Share of estimated ICPs that were hard-matched to a campaign via utm_campaign. Higher means cleaner tracking.',
      },
      {
        key: 'spend',
        label: 'Spend',
        shortLabel: 'Spend',
        color: '#f59e0b',
        lowerIsBetter: false,
        neutral: true,
        availableAt: { day: true, week: true, month: true },
        source: { day: 'daily', week: 'rollup', month: 'rollup' },
        formatValue: (v) => fmtCurrency(v),
        formatAxis:  (v) => '$' + v,
        aggregateRows: (rows) =>
          Math.round(rows.reduce((s, r) => s + (Number(r.spend) || 0), 0)),
        tooltip: 'Total Meta ad spend in this bucket.',
      },
      {
        key: 'meta_conversions',
        label: 'Meta Conversions',
        shortLabel: 'Conv.',
        color: '#ef4444',
        lowerIsBetter: false,
        availableAt: { day: true, week: true, month: true },
        source: { day: 'daily', week: 'rollup', month: 'rollup' },
        formatValue: (v) => fmtNumber(v),
        formatAxis:  (v) => v,
        aggregateRows: (rows) =>
          rows.reduce((s, r) => s + (Number(r.conversions) || Number(r.meta_conversions) || 0), 0),
        tooltip: 'Conversions as reported by Meta (pixel or lead ads). CPICP is usually a more accurate efficiency signal.',
      },
      {
        key: 'cpl',
        label: 'CPL (Meta)',
        shortLabel: 'CPL',
        color: '#06b6d4',
        lowerIsBetter: true,
        availableAt: { day: true, week: true, month: true },
        source: { day: 'daily', week: 'rollup', month: 'rollup' },
        formatValue: (v) => fmtCurrencyCents(v),
        formatAxis:  (v) => '$' + v,
        aggregateRows: (rows) => {
          const s = rows.reduce((a, r) => a + (Number(r.spend) || 0), 0);
          const c = rows.reduce((a, r) => a + (Number(r.conversions) || Number(r.meta_conversions) || 0), 0);
          return c > 0 ? Math.round((s / c) * 100) / 100 : null;
        },
        tooltip: 'Cost per Lead using Meta-reported conversions. Spend ÷ Meta conversions. Lower is better.',
      },
      {
        key: 'ctr',
        label: 'CTR',
        shortLabel: 'CTR',
        color: '#22c55e',
        lowerIsBetter: false,
        availableAt: { day: true, week: true, month: true },
        source: { day: 'daily', week: 'rollup', month: 'rollup' },
        formatValue: (v) => (v == null ? '—' : (v * 100).toFixed(2) + '%'),
        formatAxis:  (v) => (v * 100).toFixed(1) + '%',
        aggregateRows: (rows) => {
          const i = rows.reduce((s, r) => s + (Number(r.impressions) || 0), 0);
          const c = rows.reduce((s, r) => s + (Number(r.clicks) || 0), 0);
          return i > 0 ? Math.round((c / i) * 10000) / 10000 : null;
        },
        tooltip: 'Click-Through Rate. Clicks ÷ impressions. Higher usually means stronger creative.',
      },
      {
        key: 'frequency',
        label: 'Frequency',
        shortLabel: 'Freq',
        color: '#d946ef',
        lowerIsBetter: true,
        availableAt: { day: true, week: true, month: true },
        source: { day: 'daily', week: 'rollup', month: 'rollup' },
        formatValue: (v) => (v == null ? '—' : v.toFixed(2)),
        formatAxis:  (v) => v,
        aggregateRows: (rows) => {
          // Weighted: total impressions ÷ total reach.
          const i = rows.reduce((s, r) => s + (Number(r.impressions) || 0), 0);
          const rch = rows.reduce((s, r) => s + (Number(r.reach) || 0), 0);
          return rch > 0 ? Math.round((i / rch) * 100) / 100 : null;
        },
        tooltip: 'Average number of times each person in the reach saw the ad. Above 3.5 usually signals audience saturation.',
      },
    ];


    // ─── LEADERBOARD METRIC CATALOG ──────────────────────
    // Each entry defines one metric you can rank campaigns
    // by in the Top/Bottom 3 leaderboards, plus how to
    // format its value and which direction is "better".
    const LEADERBOARD_METRICS = [
      {
        key: 'cpicp_blended',
        label: 'Blended CPICP',
        lowerIsBetter: true,
        format: (v) => fmtCurrencyCents(v),
        tooltip: 'Cost per ICP using hybrid attribution. Total spend divided by estimated ICPs over the selected range. Lower is better.',
      },
      {
        key: 'estimated_icps',
        label: 'Estimated ICPs',
        lowerIsBetter: false,
        format: (v) => fmtNumber(v, 1),
        tooltip: 'Total estimated ICPs attributed to each campaign (hard UTM matches plus a proportional share of unattributed ICPs). Higher is better.',
      },
      {
        key: 'attribution_rate',
        label: 'Attribution Rate',
        lowerIsBetter: false,
        format: (v) => v != null ? v.toFixed(0) + '%' : '—',
        tooltip: 'Share of each campaign\u2019s estimated ICPs that came with a matching UTM tag. Higher means cleaner tracking. Below 50% means most credit is coming from the unattributed pool.',
      },
      {
        key: 'cpl',
        label: 'CPL (Meta)',
        lowerIsBetter: true,
        format: (v) => fmtCurrencyCents(v),
        tooltip: 'Cost per Lead based on Meta-reported conversions. Useful as an efficiency signal, but CPICP is generally more accurate because it uses HubSpot\u2019s actual decision data.',
      },
      {
        key: 'ctr',
        label: 'CTR',
        lowerIsBetter: false,
        format: (v) => v != null ? (v * 100).toFixed(2) + '%' : '—',

    // Small hover tooltip attached to a "?" icon. Used to
    // annotate non-obvious metric labels throughout the
    // dashboard.
    //
    // Uses JS-computed `position: fixed` (rather than
    // CSS-only `position: absolute`) so that the tooltip
    // escapes any overflow/scroll ancestors. This matters
    // inside the campaign performance table, where the
    // scrolling table wrapper would otherwise clip tooltips
    // on the header row. The tooltip also flips below the
    // trigger if there isn't enough room above it, and
    // clamps horizontally to the viewport.
    function InfoTip({ text }) {
      const [open, setOpen] = useState(false);
      const [style, setStyle] = useState({});
      const triggerRef = React.useRef(null);

      const show = () => {
        if (!triggerRef.current) return;
        const rect = triggerRef.current.getBoundingClientRect();
        const TOOLTIP_WIDTH = 256; // matches Tailwind w-64
        const GAP = 8;
        const flipBelow = rect.top < 90; // not enough room above
        const vw = window.innerWidth;

        // Horizontally center on trigger, then clamp to viewport.
        let left = rect.left + rect.width / 2 - TOOLTIP_WIDTH / 2;
        if (left < 8) left = 8;
        if (left + TOOLTIP_WIDTH > vw - 8) left = vw - TOOLTIP_WIDTH - 8;

        const top = flipBelow ? rect.bottom + GAP : rect.top - GAP;

        setStyle({
          position: 'fixed',
          top: top + 'px',
          left: left + 'px',
          width: TOOLTIP_WIDTH + 'px',
          transform: flipBelow ? 'none' : 'translateY(-100%)',
          zIndex: 9999,
        });
        setOpen(true);
      };

      return (
        <React.Fragment>
          <span
            ref={triggerRef}
            onMouseEnter={show}
            onMouseLeave={() => setOpen(false)}
            onClick={(e) => e.stopPropagation()}
            className="inline-flex items-center justify-center w-3.5 h-3.5 rounded-full bg-stone-300 text-stone-600 text-[9px] font-bold cursor-help leading-none select-none ml-1 align-middle"
            aria-label="More info"
          >
            ?
          </span>
          {open && (
            <div
              role="tooltip"
              className="bg-stone-900 text-white text-xs rounded-md px-3 py-2 shadow-lg pointer-events-none leading-relaxed whitespace-normal font-normal normal-case text-left"
              style={style}
            >
              {text}
            </div>
          )}
        </React.Fragment>
      );
    }

    // Renders the "go-forward trend" line that sits below
    // each top card's value. Runs linear regression across
    // weekly points and expresses the slope as a per-week
    // change rate with an arrow and directional color.
    //
    // For "neutral" metrics (like total spend), we don't
    // know if up or down is "better," so the color stays
    // gray regardless of direction.
    function GoForwardTrend({ weeklySeries, formatDelta, lowerIsBetter, neutral }) {
      const points = weeklySeries
        .map((y, i) => ({ x: i, y: (y == null || isNaN(y)) ? null : y }))
        .filter(p => p.y != null);
      if (points.length < 2) {
        return <div className="text-[11px] text-stone-400 mt-1">Not enough weeks for a trend</div>;
      }
      const reg = linearRegression(points);
      if (!reg || isNaN(reg.slope)) {
        return <div className="text-[11px] text-stone-400 mt-1">No trend</div>;
      }
      const slope = reg.slope;
      // Deadband: tiny movements aren't called trends.
      const intercept = reg.intercept || 1;
      const pctPerWk = Math.abs((slope / intercept) * 100);
      if (pctPerWk < 0.5) {
        return <div className="text-[11px] text-stone-400 mt-1">→ roughly flat</div>;
      }
      const arrow = slope > 0 ? '↗' : '↘';
      const sign = slope > 0 ? '+' : '−';
      const absDelta = Math.abs(slope);
      let color = 'text-stone-400';
      if (!neutral) {
        const improving = lowerIsBetter ? slope < 0 : slope > 0;
        color = improving ? 'text-emerald-600' : 'text-red-500';
      }
      return (
        <div className={`text-[11px] ${color} mt-1`}>
          {arrow} {sign}{formatDelta(absDelta)}/wk go-forward trend
        </div>
      );
    }

    // Primary ICP-focused cards. Reads from weekly rollup
    // (which is the source of truth for ICP counts and
    // blended attribution). This is the headline section of
    // the dashboard.
    //
    // Each card now carries:
    //  - A hover tooltip on the label explaining the metric
    //  - The topline value
    //  - A short hint describing how it's computed
    //  - A de-emphasized "go-forward trend" line showing the
    //    direction and pace of change, from linear regression
    //    across the weeks in the current date range.
    function ICPSummaryCards({ rollup }) {
      // Per-week aggregates (used both for totals and for
      // the go-forward trend regression).
      const weeklyTotals = useMemo(() => {
        const byWeek = {};
        rollup.forEach(r => {
          const week = String(r.week_start).substring(0, 10);
          if (!byWeek[week]) {
            byWeek[week] = { week, spend: 0, estIcps: 0, attribIcps: 0 };
          }
          byWeek[week].spend      += Number(r.spend) || 0;
          byWeek[week].estIcps    += Number(r.estimated_icps) || 0;
          byWeek[week].attribIcps += Number(r.icps_attributed) || 0;
        });
        return Object.values(byWeek).sort((a, b) => a.week.localeCompare(b.week));
      }, [rollup]);

      const totals = useMemo(() => {
        const t = { spend: 0, estimatedIcps: 0, attributedIcps: 0 };
        weeklyTotals.forEach(w => {
          t.spend          += w.spend;
          t.estimatedIcps  += w.estIcps;
          t.attributedIcps += w.attribIcps;
        });
        return t;
      }, [weeklyTotals]);

      const blendedCpicp = totals.estimatedIcps > 0
        ? totals.spend / totals.estimatedIcps : null;
      const attributionRate = totals.estimatedIcps > 0
        ? (totals.attributedIcps / totals.estimatedIcps) * 100 : null;

      // Per-week series for each metric — fed to GoForwardTrend.
      const spendSeries = weeklyTotals.map(w => w.spend);
      const icpsSeries  = weeklyTotals.map(w => w.estIcps);
      const cpicpSeries = weeklyTotals.map(w =>
        w.estIcps > 0 ? w.spend / w.estIcps : null
      );
      const attribSeries = weeklyTotals.map(w =>
        w.estIcps > 0 ? (w.attribIcps / w.estIcps) * 100 : null
      );

      const cards = [
        {
          label: 'Total Spend',
          value: fmtCurrency(totals.spend),
          accent: 'text-stone-800',
          hint: `${weeklyTotals.length} weekly rows`,
          tooltip: 'Total Meta ad spend across all campaigns, summed over the weekly rollup rows in the selected date range.',
          trend: {
            weeklySeries: spendSeries,
            formatDelta: (v) => fmtCurrency(v),
            neutral: true,
          },
        },
        {
          label: 'Estimated ICPs',
          value: fmtNumber(totals.estimatedIcps, 1),
          accent: 'text-amber-600',
          hint: `${fmtNumber(totals.attributedIcps)} UTM-matched`,
          tooltip: 'Total ICPs credited to campaigns using hybrid attribution: hard UTM matches plus a proportional share of unattributed ICPs (distributed by each campaign\u2019s Meta conversion volume). ICP = HubSpot contact decisioned as investment_crowdfunding.',
          trend: {
            weeklySeries: icpsSeries,
            formatDelta: (v) => fmtNumber(v, 1),
            lowerIsBetter: false,
          },
        },
        {
          label: 'Blended CPICP',
          value: fmtCurrencyCents(blendedCpicp),
          accent: 'text-cyan-700',
          hint: 'Spend ÷ Est. ICPs',
          tooltip: 'Cost Per ICP using hybrid attribution. This is the primary efficiency metric for the marketing team. Lower is better.',
          trend: {
            weeklySeries: cpicpSeries,
            formatDelta: (v) => fmtCurrencyCents(v),
            lowerIsBetter: true,
          },
        },
        {
          label: 'Attribution Rate',
          value: fmtPct(attributionRate, 1),
          accent: 'text-emerald-700',
          hint: 'UTM-matched share',
          tooltip: 'Share of estimated ICPs that were matched to a campaign via utm_campaign. Higher means cleaner tracking. Below 50% means most credit is coming from the unattributed pool (allocation by Meta conversion share).',
          trend: {
            weeklySeries: attribSeries,
            formatDelta: (v) => v.toFixed(1) + ' pp',
            lowerIsBetter: false,
          },
        },
      ];

      return (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          {cards.map(c => (
            <div key={c.label} className="bg-white p-4 rounded-lg shadow-sm border border-stone-200">
              <div className="text-xs text-stone-500 uppercase tracking-wide font-medium flex items-center">
                <span>{c.label}</span>
                <InfoTip text={c.tooltip} side="bottom" />
              </div>
              <div className={`text-2xl font-bold mt-1 ${c.accent}`}>{c.value}</div>
              <div className="text-xs text-stone-400 mt-1">{c.hint}</div>
              <GoForwardTrend {...c.trend} />
            </div>
          ))}
        </div>
      );
    }

    // ── Top/Bottom 3 performer tile ────────────────────
    // Ranks campaigns by a dropdown-selectable metric.
    // "Top" honors the metric's natural direction (lowest
    // CPICP = top, highest CTR = top, etc.). "Bottom" is
    // the reverse. Ties broken by spend (bigger spender
    // first) so zero-ICP or zero-CTR campaigns don't crowd
    // the leaderboard with noise.
    function PerformanceLeaderboard({ rollup, rangeStart, rangeEnd, direction }) {
      const [metricKey, setMetricKey] = useState('cpicp_blended');
      const metric = LEADERBOARD_METRICS.find(m => m.key === metricKey) || LEADERBOARD_METRICS[0];
      const isBest = direction === 'best';

      const ranked = useMemo(() => {
        const agg = aggregateCampaigns(rollup, rangeStart, rangeEnd);

        const ascending = (isBest && metric.lowerIsBetter) || (!isBest && !metric.lowerIsBetter);
        valid.sort((a, b) => {
          const diff = ascending ? a[metricKey] - b[metricKey] : b[metricKey] - a[metricKey];
          if (diff !== 0) return diff;
          // Tiebreak: bigger spender first (more meaningful signal).
          return b.spend - a.spend;
        });
        return valid.slice(0, 3);
      }, [rollup, rangeStart, rangeEnd, metricKey, isBest, metric.lowerIsBetter]);

      const titleColor = isBest ? 'text-emerald-700' : 'text-red-700';

                  ? 'The three campaigns ranking highest on the selected metric, using its natural direction (e.g. lowest CPICP, highest CTR). Ties broken by total spend.'
                  : 'The three campaigns ranking lowest on the selected metric. Useful for spotting laggards. Campaigns with no data for the chosen metric are excluded.'}
                side="bottom"

            <select
              value={metricKey}
              onChange={e => setMetricKey(e.target.value)}

              title={metric.tooltip}
            >
              {LEADERBOARD_METRICS.map(m => (
                <option key={m.key} value={m.key}>{m.label}</option>
              ))}
            </select>
          </div>
          <ul className="space-y-2">
            {ranked.length === 0 ? (
              <li className="text-sm text-stone-500 py-2 text-center bg-white rounded">
                No campaigns with data in range
              </li>
            ) : ranked.map((c, i) => (
              <li key={c.campaign_name} className="flex items-center gap-3 bg-white rounded p-2 border border-stone-100">
                <div className={`flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold text-white ${badgeColor}`}>
                  {i + 1}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium text-stone-900 truncate" title={c.campaign_name}>
                    {c.campaign_name}
                  </div>
                  <div className="text-[11px] text-stone-500">
                    {fmtCurrency(c.spend)} spend · {fmtNumber(c.estimated_icps, 1)} ICPs
                  </div>
                </div>
                <div className="flex-shrink-0 text-right">
                  <div className="text-sm font-bold text-stone-900">{metric.format(c[metricKey])}</div>
                  <div className="text-[9px] text-stone-400 uppercase tracking-wide">
                    {metric.label}
                  </div>
                </div>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    // Secondary operational metrics from the daily dataset.
    // Kept below the fold as "also useful" context — not the
    // headline. Gives a day-level operational view (is my

    function DailyOpsCards({ daily }) {

    // ── PRIMARY CHART: multi-metric trend chart ──
    // Renders a trend chart with:
    //   - A metric dropdown (anything in METRIC_CATALOG)
    //   - A granularity toggle (day / week / month)
    //   - A mode toggle (per-campaign / portfolio-wide)
    //   - An optional comparison metric (portfolio mode only,
    //     rendered on a second right-hand Y axis)
    //   - Linear-regression trendlines on/off
    //   - Per-campaign toggles (per_campaign mode only)
    //
    // Data sources:
    //   - Day granularity reads from the daily dataset
    //     (rolling_data). ICP-derived metrics (CPICP, ICPs,
    //     attribution rate) are NOT available at this
    //     granularity because ICPs are attributed weekly.
    //   - Week & Month granularities read from the weekly
    //     rollup dataset. Month buckets are formed by grouping
    //     weekly rollup rows by their first-of-month key.
    function MetricTrendChart({ daily, rollup, rangeStart, rangeEnd }) {
      const [granularity, setGranularity]     = useState('week');
      const [chartMode, setChartMode]         = useState('per_campaign');
      const [primaryKey, setPrimaryKey]       = useState('cpicp_blended');
      const [comparisonKey, setComparisonKey] = useState(''); // '' = none
      const [showTrendlines, setShowTrendlines] = useState(true);

      // Metrics available at the current granularity.
      const availableMetrics = useMemo(
        () => METRIC_CATALOG.filter(m => m.availableAt[granularity]),
        [granularity]
      );

      // If the user switches granularity and the current
      // metric isn't supported there, fall back to the first
      // available metric. Same for comparison.
      useEffect(() => {
        if (!availableMetrics.find(m => m.key === primaryKey)) {
          if (availableMetrics[0]) setPrimaryKey(availableMetrics[0].key);
        }
        if (comparisonKey && !availableMetrics.find(m => m.key === comparisonKey)) {
          setComparisonKey('');
        }
      }, [granularity, availableMetrics, primaryKey, comparisonKey]);

      const primaryMetric    = METRIC_CATALOG.find(m => m.key === primaryKey) || METRIC_CATALOG[0];
      const comparisonMetric = comparisonKey
        ? METRIC_CATALOG.find(m => m.key === comparisonKey) || null
        : null;
      const isPortfolio = chartMode === 'portfolio';

      // ── Source rows filtered by global date range ──
      const sourceRows = useMemo(() => {
        if (granularity === 'day') {
          // daily is already server-filtered; belt+suspenders.
          return (daily || []).filter(r => {
            const d = String(r.date).substring(0, 10);
            return d >= rangeStart && d <= rangeEnd;
          });
        }
        // Week & Month both read from the weekly rollup.
        return (rollup || []).filter(r => {
          const ws = String(r.week_start).substring(0, 10);
          return ws >= rangeStart && ws <= rangeEnd;
        });
      }, [daily, rollup, rangeStart, rangeEnd, granularity]);

      // Bucket key for X axis grouping.
      const getBucketKey = useCallback((row) => {
        if (granularity === 'day')   return String(row.date).substring(0, 10);
        if (granularity === 'week')  return String(row.week_start).substring(0, 10);
        // month: yyyy-MM
        const base = String(row.week_start || row.date).substring(0, 10);
        return monthKey(base);
      }, [granularity]);

      // All distinct buckets in the source, sorted.
      const allBuckets = useMemo(() => {
        const s = new Set();
        sourceRows.forEach(r => s.add(getBucketKey(r)));
        return Array.from(s).sort();
      }, [sourceRows, getBucketKey]);

      // Per-campaign totals (used for ranking + toggle pills).
      const campaignSummary = useMemo(() => {
        const byCampaign = {};
        sourceRows.forEach(r => {
          const key = r.campaign_name;
          if (!byCampaign[key]) {
            byCampaign[key] = { name: key, totalSpend: 0 };
          }
          byCampaign[key].totalSpend += Number(r.spend) || 0;
        });
        return Object.values(byCampaign).sort((a, b) => b.totalSpend - a.totalSpend);
      }, [sourceRows]);

      // Default visible = top 5 by spend.
      const defaultVisible = useMemo(
        () => new Set(campaignSummary.slice(0, 5).map(c => c.name)),
        [campaignSummary]
      );
      const [visible, setVisible] = useState(defaultVisible);
      useEffect(() => { setVisible(defaultVisible); }, [defaultVisible]);

      // Stable color per campaign (by spend rank).
      const colorMap = useMemo(() => {
        const m = {};
        campaignSummary.forEach((c, i) => { m[c.name] = colorForCampaign(i); });
        return m;
      }, [campaignSummary]);

      // Pre-index source rows by bucket + campaign to keep
      // chartData aggregation fast.
      const rowsByBucket = useMemo(() => {
        const map = {};
        sourceRows.forEach(r => {
          const b = getBucketKey(r);
          if (!map[b]) map[b] = [];
          map[b].push(r);
        });
        return map;
      }, [sourceRows, getBucketKey]);

      // Chart data shaped for Recharts. In per_campaign mode
      // each row has one entry per visible campaign; in
      // portfolio mode each row has the primary + optional
      // comparison metric.
      const chartData = useMemo(() => {
        return allBuckets.map(bucket => {
          const bucketRows = rowsByBucket[bucket] || [];
          const row = { bucket };

          if (isPortfolio) {
            row[primaryMetric.label] = primaryMetric.aggregateRows(bucketRows);
            if (comparisonMetric) {
              row[comparisonMetric.label] = comparisonMetric.aggregateRows(bucketRows);
            }
          } else {
            campaignSummary
              .filter(c => visible.has(c.name))
              .forEach(c => {
                const campaignRows = bucketRows.filter(r => r.campaign_name === c.name);
                if (campaignRows.length > 0) {
                  row[c.name] = primaryMetric.aggregateRows(campaignRows);
                }
              });
          }

          return row;
        });
      }, [allBuckets, rowsByBucket, isPortfolio, primaryMetric, comparisonMetric, campaignSummary, visible]);

      // Overlay trendline values on each line.
      const chartDataWithTrends = useMemo(() => {
        if (!showTrendlines) return chartData;

        const linesToTrend = isPortfolio
          ? [primaryMetric.label, ...(comparisonMetric ? [comparisonMetric.label] : [])]
          : campaignSummary.filter(c => visible.has(c.name)).map(c => c.name);

        const trendParams = {};
        linesToTrend.forEach(lineKey => {
          const points = chartData
            .map((r, i) => ({ x: i, y: r[lineKey] }))
            .filter(p => p.y != null && !isNaN(p.y));
          trendParams[lineKey] = linearRegression(points);
        });

        return chartData.map((row, i) => {
          const out = { ...row };
          linesToTrend.forEach(lineKey => {
            const t = trendParams[lineKey];
            if (t && !isNaN(t.slope)) {
              out[`${lineKey}__trend`] = Math.round((t.slope * i + t.intercept) * 100) / 100;
            }
          });
          return out;
        });
      }, [chartData, showTrendlines, isPortfolio, primaryMetric, comparisonMetric, campaignSummary, visible]);

      const toggleCampaign = (name) => {
        setVisible(prev => {
          const next = new Set(prev);
          if (next.has(name)) next.delete(name); else next.add(name);
          return next;
        });
      };
      const showAll   = () => setVisible(new Set(campaignSummary.map(c => c.name)));
      const showTop5  = () => setVisible(new Set(campaignSummary.slice(0, 5).map(c => c.name)));
      const showNone  = () => setVisible(new Set());

      const hasData = chartData.length > 0 && (
        isPortfolio
          ? chartData.some(r => r[primaryMetric.label] != null)
          : chartData.some(r => Object.keys(r).some(k => k !== 'bucket' && r[k] != null))
      );

      // X axis label formatter: weekly/daily stay as-is,
      // monthly gets prettier 2026-04 → "Apr '26"
      const formatBucket = (b) => {
        if (granularity === 'month' && /^\d{4}-\d{2}$/.test(b)) {
          const [y, m] = b.split('-').map(Number);
          const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          return `${names[m - 1]} '${String(y).slice(2)}`;
        }
        return b;
      };

      // A shared tooltip formatter that routes each series
      // to its metric's formatter.
      const tooltipFormatter = (value, name) => {
        const nameStr = String(name);
        const isTrend = nameStr.endsWith('__trend');
        const cleanName = isTrend ? nameStr.replace('__trend', '') : nameStr;

        if (isPortfolio) {
          // name matches primaryMetric.label or comparisonMetric.label
          const m = cleanName === primaryMetric.label
            ? primaryMetric
            : (comparisonMetric && cleanName === comparisonMetric.label ? comparisonMetric : null);
          if (m) return [m.formatValue(value), cleanName + (isTrend ? ' (trend)' : '')];
        } else {
          // per-campaign; all lines use the primary metric's format
          return [primaryMetric.formatValue(value), cleanName + (isTrend ? ' (trend)' : '')];
        }
        return [value, cleanName];
      };

      return (
        <div className="bg-white p-4 rounded-lg shadow-sm border border-stone-200">
          <div className="flex items-start justify-between mb-3 gap-4 flex-wrap">
            <div>
              <h3 className="text-base font-semibold text-stone-800 flex items-center">
                <span>{primaryMetric.label} — {granularity === 'day' ? 'Daily' : granularity === 'week' ? 'Weekly' : 'Monthly'}</span>
                <InfoTip text={primaryMetric.tooltip} />
              </h3>
              <p className="text-xs text-stone-500 mt-0.5">
                {isPortfolio
                  ? 'Portfolio-wide aggregate. Use the comparison dropdown to overlay a second metric on the right axis.'
                  : 'One line per campaign. Dashed lines are linear-regression trendlines.'}
              </p>
            </div>

            <div className="flex items-center gap-3 text-xs flex-wrap justify-end">
              {/* Granularity toggle */}
              <div className="inline-flex rounded border border-stone-300 overflow-hidden" role="group">
                {['day','week','month'].map(g => (
                  <button
                    key={g}
                    onClick={() => setGranularity(g)}
                    className={`px-2.5 py-1 capitalize ${
                      granularity === g
                        ? 'bg-stone-800 text-white'
                        : 'bg-white text-stone-700 hover:bg-stone-100'
                    } ${g !== 'day' ? 'border-l border-stone-300' : ''}`}
                  >
                    {g}
                  </button>
                ))}
              </div>

              {/* Mode toggle */}
              <div className="inline-flex rounded border border-stone-300 overflow-hidden">
                <button
                  onClick={() => setChartMode('per_campaign')}
                  className={`px-2.5 py-1 ${
                    !isPortfolio
                      ? 'bg-amber-500 text-white'
                      : 'bg-white text-stone-700 hover:bg-stone-100'
                  }`}
                >
                  By campaign
                </button>
                <button
                  onClick={() => setChartMode('portfolio')}
                  className={`px-2.5 py-1 border-l border-stone-300 ${
                    isPortfolio
                      ? 'bg-amber-500 text-white'
                      : 'bg-white text-stone-700 hover:bg-stone-100'
                  }`}
                >
                  Portfolio-wide
                </button>
              </div>

              <label className="flex items-center gap-1.5 cursor-pointer">
                <input
                  type="checkbox"
                  checked={showTrendlines}
                  onChange={e => setShowTrendlines(e.target.checked)}
                  className="rounded border-stone-300"
                />
                <span className="text-stone-700">Trendlines</span>
              </label>
            </div>
          </div>

          {/* Metric dropdowns row */}
          <div className="flex items-center gap-4 mb-3 text-xs flex-wrap">
            <div className="flex items-center gap-1.5">
              <label className="text-stone-600 font-medium">Primary metric:</label>
              <select
                value={primaryKey}
                onChange={e => setPrimaryKey(e.target.value)}
                className="border border-stone-300 rounded bg-white px-2 py-1 text-stone-700 cursor-pointer"
              >
                {availableMetrics.map(m => (
                  <option key={m.key} value={m.key}>{m.label}</option>
                ))}
              </select>
              <InfoTip text={primaryMetric.tooltip} />
            </div>

            {isPortfolio && (
              <div className="flex items-center gap-1.5">
                <label className="text-stone-600 font-medium">Compare with:</label>
                <select
                  value={comparisonKey}
                  onChange={e => setComparisonKey(e.target.value)}
                  className="border border-stone-300 rounded bg-white px-2 py-1 text-stone-700 cursor-pointer"
                >
                  <option value="">(none)</option>
                  {availableMetrics
                    .filter(m => m.key !== primaryKey)
                    .map(m => (
                      <option key={m.key} value={m.key}>{m.label}</option>
                    ))}
                </select>
                {comparisonMetric && <InfoTip text={comparisonMetric.tooltip} />}
              </div>
            )}

            {!isPortfolio && (
              <div className="flex items-center gap-1 ml-auto">
                <button onClick={showTop5} className="px-2 py-1 bg-stone-100 hover:bg-stone-200 rounded">Top 5</button>
                <button onClick={showAll} className="px-2 py-1 bg-stone-100 hover:bg-stone-200 rounded">All</button>
                <button onClick={showNone} className="px-2 py-1 bg-stone-100 hover:bg-stone-200 rounded">None</button>
              </div>
            )}
          </div>

          {!hasData ? (
            <p className="text-stone-500 text-sm py-16 text-center">
              No data for {primaryMetric.label} at {granularity} granularity in the selected range.
            </p>
          ) : (
            <ResponsiveContainer width="100%" height={380}>
              <LineChart data={chartDataWithTrends} margin={{ top: 10, right: 30, left: 10, bottom: 5 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#e7e5e4" />
                <XAxis
                  dataKey="bucket"
                  tick={{ fontSize: 11 }}
                  minTickGap={20}
                  tickFormatter={formatBucket}
                />
                <YAxis
                  yAxisId="left"
                  tick={{ fontSize: 11 }}
                  tickFormatter={primaryMetric.formatAxis}
                  label={{
                    value: primaryMetric.label,
                    angle: -90,
                    position: 'insideLeft',
                    fontSize: 11,
                    fill: '#78716c',
                  }}
                />
                {isPortfolio && comparisonMetric && (
                  <YAxis
                    yAxisId="right"
                    orientation="right"
                    tick={{ fontSize: 11 }}
                    tickFormatter={comparisonMetric.formatAxis}
                    label={{
                      value: comparisonMetric.label,
                      angle: 90,
                      position: 'insideRight',
                      fontSize: 11,
                      fill: '#78716c',
                    }}
                  />
                )}
                <Tooltip
                  formatter={tooltipFormatter}
                  labelFormatter={formatBucket}
                  contentStyle={{ fontSize: 12 }}
                />
                {isPortfolio ? (
                  <>
                    <Line
                      yAxisId="left"
                      type="monotone"
                      dataKey={primaryMetric.label}
                      stroke={primaryMetric.color}
                      strokeWidth={3}
                      dot={{ r: 4 }}
                      activeDot={{ r: 6 }}
                      connectNulls
                    />
                    {showTrendlines && (
                      <Line
                        yAxisId="left"
                        type="linear"
                        dataKey={`${primaryMetric.label}__trend`}
                        stroke={primaryMetric.color}
                        strokeWidth={2}
                        strokeDasharray="6 4"
                        dot={false}
                        activeDot={false}
                        legendType="none"
                        opacity={0.6}
                        connectNulls
                      />
                    )}
                    {comparisonMetric && (
                      <Line
                        yAxisId="right"
                        type="monotone"
                        dataKey={comparisonMetric.label}
                        stroke={comparisonMetric.color}
                        strokeWidth={3}
                        dot={{ r: 4 }}
                        activeDot={{ r: 6 }}
                        connectNulls
                      />
                    )}
                    {showTrendlines && comparisonMetric && (
                      <Line
                        yAxisId="right"
                        type="linear"
                        dataKey={`${comparisonMetric.label}__trend`}
                        stroke={comparisonMetric.color}
                        strokeWidth={2}
                        strokeDasharray="6 4"
                        dot={false}
                        activeDot={false}
                        legendType="none"
                        opacity={0.6}
                        connectNulls
                      />
                    )}
                  </>
                ) : (
                  <>
                    {campaignSummary
                      .filter(c => visible.has(c.name))
                      .map(c => (
                        <Line
                          key={c.name}
                          yAxisId="left"
                          type="monotone"
                          dataKey={c.name}
                          stroke={colorMap[c.name]}
                          strokeWidth={2.5}
                          dot={{ r: 3 }}
                          activeDot={{ r: 5 }}
                          connectNulls
                        />
                      ))}
                    {showTrendlines && campaignSummary
                      .filter(c => visible.has(c.name))
                      .map(c => (
                        <Line
                          key={`${c.name}__trend`}
                          yAxisId="left"
                          type="linear"
                          dataKey={`${c.name}__trend`}
                          stroke={colorMap[c.name]}
                          strokeWidth={1.5}
                          strokeDasharray="6 4"
                          dot={false}
                          activeDot={false}
                          legendType="none"
                          opacity={0.6}
                          connectNulls
                        />
                      ))}
                  </>
                )}
              </LineChart>
            </ResponsiveContainer>
          )}

          {/* Campaign toggle legend — per-campaign only */}
          {!isPortfolio && campaignSummary.length > 0 && (
            <div className="mt-3 flex flex-wrap gap-1.5">
              {campaignSummary.map(c => {
                const isVisible = visible.has(c.name);
                return (
                  <button
                    key={c.name}
                    onClick={() => toggleCampaign(c.name)}
                    className={`flex items-center gap-1.5 px-2 py-1 rounded text-xs border transition ${
                      isVisible
                        ? 'bg-white border-stone-300 text-stone-800'
                        : 'bg-stone-50 border-stone-200 text-stone-400'
                    }`}
                    title={`${fmtCurrency(c.totalSpend)} total spend in range`}
                  >
                    <span
                      className="inline-block w-3 h-3 rounded-sm"
                      style={{
                        backgroundColor: isVisible ? colorMap[c.name] : '#d6d3d1'
                      }}
                    />
                    <span className="truncate max-w-[180px]">{c.name}</span>
                  </button>
                );
              })}
            </div>
          )}
        </div>
      );
    }



    function SpendConversionsChart({ daily }) {
      const data = useMemo(() => {
        const map = {};
        daily.forEach(r => {
          if (!map[r.date]) map[r.date] = { date: r.date, spend: 0, conversions: 0 };
          map[r.date].spend       += Number(r.spend) || 0;
          map[r.date].conversions += Number(r.conversions) || 0;
        });
        return Object.values(map)
          .sort((a, b) => a.date.localeCompare(b.date))
          .map(r => ({ ...r, spend: Math.round(r.spend) }));
      }, [daily]);

      return (
        <div className="bg-white p-4 rounded-lg shadow-sm border border-stone-200">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-semibold text-stone-700">
              Daily Spend &amp; Conversions
            </h3>
            <span className="text-xs text-stone-500">{data.length} days</span>
          </div>
          {data.length === 0 ? (
            <p className="text-stone-500 text-sm py-16 text-center">No data in selected range</p>
          ) : (
            <ResponsiveContainer width="100%" height={300}>
              <LineChart data={data} margin={{ top: 5, right: 30, left: 10, bottom: 5 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#e7e5e4" />
                <XAxis dataKey="date" tick={{ fontSize: 11 }} minTickGap={30} />
                <YAxis
                  yAxisId="left"
                  tick={{ fontSize: 11 }}
                  tickFormatter={v => '$' + v}
                />
                <YAxis
                  yAxisId="right"
                  orientation="right"
                  tick={{ fontSize: 11 }}
                />
                <Tooltip
                  formatter={(value, name) =>
                    name === 'Spend' ? ['$' + value, name] : [value, name]
                  }
                />
                <Legend />
                <Line
                  yAxisId="left"
                  type="monotone"
                  dataKey="spend"
                  stroke="#f59e0b"
                  name="Spend"
                  strokeWidth={2}
                  dot={false}
                />
                <Line
                  yAxisId="right"
                  type="monotone"
                  dataKey="conversions"
                  stroke="#0891b2"
                  name="Conversions"
                  strokeWidth={2}
                  dot={false}
                />
              </LineChart>
            </ResponsiveContainer>
          )}
        </div>
      );
    }

    // Primary campaign table — driven by the weekly rollup
    // (same source of truth as the CPICP chart). Shows the
    // numbers that actually get reviewed in weekly meetings:
    // range-total CPICP, latest week, WoW change, 4-week
    // baseline comparison, and a trend arrow from linear
    // regression over the visible weeks.
    // Period presets specific to the campaign performance
    // table. All presets end at yesterday (today's data is
    // incomplete because the daily pipeline runs at 7am for
    // "yesterday's data"). Custom picker uses the same
    // constraint — today's date is not selectable.
    const TABLE_PERIOD_PRESETS = [
      { key: '7d',  label: 'Prior 7 days',  start: () => priorNDays(7),  end: yesterdayStr },
      { key: '14d', label: 'Prior 14 days', start: () => priorNDays(14), end: yesterdayStr },
      { key: '30d', label: 'Prior 30 days', start: () => priorNDays(30), end: yesterdayStr },
      { key: 'mtd', label: 'MTD',           start: startOfMonthStr,      end: yesterdayStr },
      { key: 'qtd', label: 'QTD',           start: startOfQuarterStr,    end: yesterdayStr },
      { key: 'ytd', label: 'YTD',           start: startOfYearStr,       end: yesterdayStr },
    ];

    function CampaignPerformanceTable({ rollup }) {
      const [sortKey, setSortKey] = useState('blendedCpicp');
      const [sortDir, setSortDir] = useState('asc'); // lowest CPICP first

      // Period selector state — independent from the global
      // dashboard date range. Default: prior 30 days.
      const [presetKey, setPresetKey]   = useState('30d');
      const [useCustom, setUseCustom]   = useState(false);
      const [customStart, setCustomStart] = useState(priorNDays(30));
      const [customEnd, setCustomEnd]     = useState(yesterdayStr());

      const { rangeStart, rangeEnd } = useMemo(() => {
        if (useCustom) {
          return { rangeStart: customStart, rangeEnd: customEnd };
        }
        const preset = TABLE_PERIOD_PRESETS.find(p => p.key === presetKey) || TABLE_PERIOD_PRESETS[2];
        return { rangeStart: preset.start(), rangeEnd: preset.end() };
      }, [useCustom, presetKey, customStart, customEnd]);

      // Max date for the custom picker. Yesterday, never today.
      const maxDate = yesterdayStr();

      const rows = useMemo(() => {
        const inRange = rollup.filter(r => {
          const ws = String(r.week_start).substring(0, 10);
          return ws >= rangeStart && ws <= rangeEnd;
        });

        const byCampaign = {};
        inRange.forEach(r => {
          const key = r.campaign_name;
          if (!byCampaign[key]) {
            byCampaign[key] = {
              campaign: key,
              spend: 0,
              estIcps: 0,
              attribIcps: 0,
              weeks: [],
            };
          }
          const c = byCampaign[key];
          c.spend      += Number(r.spend) || 0;
          c.estIcps    += Number(r.estimated_icps) || 0;
          c.attribIcps += Number(r.icps_attributed) || 0;
          c.weeks.push({
            week_start: String(r.week_start).substring(0, 10),
            cpicp: Number(r.cpicp_blended) || null,
            icps:  Number(r.estimated_icps) || 0,
            spend: Number(r.spend) || 0,
          });
        });

        return Object.values(byCampaign).map(c => {
          c.weeks.sort((a, b) => a.week_start.localeCompare(b.week_start));
          const validCpicps = c.weeks
            .map((w, i) => ({ x: i, y: w.cpicp }))
            .filter(p => p.y != null);

          const latest = c.weeks[c.weeks.length - 1];
          const prior  = c.weeks[c.weeks.length - 2];
          const latestCpicp = latest ? latest.cpicp : null;
          const priorCpicp  = prior ? prior.cpicp : null;
          const wowPct = (latestCpicp != null && priorCpicp != null && priorCpicp > 0)
            ? ((latestCpicp - priorCpicp) / priorCpicp) * 100 : null;

          // 4-week baseline = average of last 4 completed weeks
          // up to (but not including) the latest.
          const base4 = c.weeks.slice(Math.max(0, c.weeks.length - 5), c.weeks.length - 1);
          const base4Valid = base4.filter(w => w.cpicp != null);
          const base4Avg = base4Valid.length > 0
            ? base4Valid.reduce((s, w) => s + w.cpicp, 0) / base4Valid.length
            : null;

          // Linear regression slope over visible weeks.
          // Positive slope = CPICP rising = bad.
          // Negative slope = CPICP falling = good.
          const reg = linearRegression(validCpicps);
          const trendSlope = reg ? reg.slope : null;

          // Percent change implied by slope over the full range.
          const trendPct = (reg && validCpicps.length >= 2)
            ? (reg.slope * (validCpicps.length - 1) / (reg.intercept || 1)) * 100
            : null;

          const blendedCpicp = c.estIcps > 0 ? c.spend / c.estIcps : null;
          const attribRate = c.estIcps > 0 ? (c.attribIcps / c.estIcps) * 100 : null;

          return {
            ...c,
            blendedCpicp,
            latestCpicp,
            base4Avg,
            wowPct,
            trendSlope,
            trendPct,
            attribRate,
            weekCount: c.weeks.length,
          };
        });
      }, [rollup, rangeStart, rangeEnd]);

      const sorted = useMemo(() => {
        const copy = [...rows];
        copy.sort((a, b) => {
          const av = a[sortKey];
          const bv = b[sortKey];
          if (av == null && bv == null) return 0;
          if (av == null) return 1;
          if (bv == null) return -1;
          if (typeof av === 'string') {
            return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
          }
          return sortDir === 'asc' ? av - bv : bv - av;
        });
        return copy;
      }, [rows, sortKey, sortDir]);

      const toggleSort = (k, defaultDir = 'desc') => {
        if (sortKey === k) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
        else { setSortKey(k); setSortDir(defaultDir); }
      };

      const Th = ({ k, children, align = 'left', defaultDir }) => (
        <th
          onClick={() => toggleSort(k, defaultDir)}
          className={`px-3 py-2 text-${align} cursor-pointer hover:bg-stone-100 select-none font-semibold whitespace-nowrap`}
        >
          {children}
          <span className="ml-1 text-stone-400">
            {sortKey === k ? (sortDir === 'asc' ? '▲' : '▼') : ''}
          </span>
        </th>
      );

      const renderTrend = (slope, pct) => {
        if (slope == null) return <span className="text-stone-300">—</span>;
        // Slight deadband so tiny wobbles aren't called trends.
        if (Math.abs(slope) < 0.5) {
          return <span className="text-stone-500" title="Flat">→ flat</span>;
        }
        if (slope < 0) {
          return (
            <span className="text-emerald-700 font-medium" title={`CPICP trending down (${pct?.toFixed(1)}%)`}>
              ↘ improving
            </span>
          );
        }
        return (
          <span className="text-red-700 font-medium" title={`CPICP trending up (${pct?.toFixed(1)}%)`}>
            ↗ worsening
          </span>
        );
      };

      const renderWow = (pct) => {
        if (pct == null) return <span className="text-stone-300">—</span>;
        const cls = pct < 0 ? 'text-emerald-700' : pct > 0 ? 'text-red-700' : 'text-stone-500';
        const sign = pct > 0 ? '+' : '';
        return <span className={cls}>{sign}{pct.toFixed(1)}%</span>;
      };

      return (
        <div className="bg-white rounded-lg shadow-sm border border-stone-200">
          <div className="p-4 border-b border-stone-200">
            <div className="flex items-start justify-between mb-3 flex-wrap gap-3">
              <div>
                <h3 className="text-base font-semibold text-stone-800 flex items-center">
                  <span>Campaign Performance</span>
                  <InfoTip text="Per-campaign totals over the selected period. Uses weekly rollup data filtered to weeks whose start date falls inside the period. Sortable by every column." />
                </h3>
                <p className="text-xs text-stone-500 mt-0.5">
                  {rangeStart} → {rangeEnd} · {rows.length} campaigns · Sortable by any column.
                </p>
              </div>
            </div>

            {/* Period selector — independent from the global date range */}
            <div className="flex items-center gap-2 flex-wrap">
              <span className="text-xs font-semibold text-stone-700 mr-1">Period:</span>
              {TABLE_PERIOD_PRESETS.map(p => (
                <button
                  key={p.key}
                  onClick={() => { setUseCustom(false); setPresetKey(p.key); }}
                  className={`px-2.5 py-1 rounded text-xs transition ${
                    !useCustom && presetKey === p.key
                      ? 'bg-stone-800 text-white shadow-sm'
                      : 'bg-stone-100 text-stone-700 hover:bg-stone-200'
                  }`}

    function NarrativePanel({ narrative }) {

    function MappingsTable({ mappings }) {
